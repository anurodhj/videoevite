<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University of Rochester, President</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --gold-pale: #F5EDD6;
            --cream: #FAF7F2;
            --bg-deep: #0f1117;
            --bg-surface: #161821;
            --charcoal: #1A1916;
            --warm-gray: #6B6660;
            --border: rgba(201, 168, 76, 0.25);
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'Jost', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(168deg, #0f1117 0%, #141622 40%, #181a28 100%);
            color: var(--cream);
            font-family: var(--font-sans);
            font-weight: 300;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            min-height: 100vh;
        }

        /* ── Header / Navbar ── */
        .site-header {
            width: 100%;
            padding: 18px 40px;
            border-bottom: 2px solid var(--gold);
            display: flex;
            align-items: center;
            gap: 40px;
            font-family: var(--font-serif);
            background: rgba(13, 12, 10, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .logo-link:hover .logo-icon {
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.35);
        }

        .play-triangle {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 7px 0 7px 12px;
            border-color: transparent transparent transparent var(--gold);
            margin-left: 3px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 2.5px;
            color: var(--cream);
            line-height: 1;
        }

        .logo-text .accent {
            color: var(--gold);
        }

        .logo-tagline {
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(250, 247, 242, 0.4);
            margin-top: 4px;
            font-family: var(--font-sans);
        }

        /* Nav links on the left, after logo */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }

        .nav-links li a {
            font-size: 11px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(250, 247, 242, 0.45);
            text-decoration: none;
            font-family: var(--font-sans);
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links li a:hover {
            color: var(--gold-light);
        }

        .nav-links li a:hover::after {
            width: 100%;
        }

        /* ── Video area ── */
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
        }

        video {
            max-width: 100%;
            height: auto;
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }

        .responsive-video {
            width: 100%;
            height: auto;
            max-height: 82vh;
            object-fit: contain;
        }

        video:hover {
            transform: scale(1.01);
            box-shadow: 0 25px 70px rgba(201, 168, 76, 0.15);
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .site-header {
                padding: 14px 18px;
                flex-wrap: wrap;
                gap: 12px;
            }

            .nav-links {
                gap: 16px;
            }

            .nav-links li a {
                font-size: 10px;
                letter-spacing: 1.5px;
            }

            .video-container {
                padding: 2rem 1rem;
            }

            video {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>

<body>
    <!-- ── Header ── -->
    <header class="site-header">
        <a href="https://videoevite.com" class="logo-link">
            <div class="logo-icon">
                <div class="play-triangle"></div>
            </div>
            <div>
                <div class="logo-text">Video<span class="accent">Evite</span></div>
                <div class="logo-tagline">Personalized Video Messages</div>
            </div>
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="https://videoevite.com/#occasions">Weddings</a></li>
                <li><a href="https://videoevite.com/#occasions">Hotels</a></li>
                <li><a href="https://videoevite.com/#occasions">Admissions</a></li>
                <li><a href="https://videoevite.com/#occasions">Events</a></li>
            </ul>
        </nav>
    </header>

    <!-- ── Video ── -->
    <div class="video-container">
        <video class="responsive-video" src="https://anurodhj.github.io/vids/assets/roche.mp4" autoplay
            controls></video>
    </div>
</body>

</html>
